<!DOCTYPE html>
<html>
<head>
    <title>ArchAgent-R</title>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        window.mermaid = mermaid;
        mermaid.initialize({ startOnLoad: false });
    </script>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #020617;
            padding: 20px;
            border-right: 1px solid #1e293b;
        }

        .history-item {
            background: #1e293b;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .history-item:hover { background: #334155; }

        .history-title { font-weight: bold; font-size: 14px; }
        .history-date { font-size: 12px; color: #94a3b8; margin-top: 5px; }

        .main { flex: 1; padding: 30px; }

        .topbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: 35px;
        }

        .auth-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .auth-btn.secondary { background: #334155; }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #3b82f6;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .welcome {
            max-width: 850px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        .welcome h1 { font-size: 42px; margin-bottom: 12px; }

        .welcome p {
            color: #cbd5e1;
            font-size: 18px;
            line-height: 1.6;
        }

        .input-card {
            max-width: 850px;
            margin: 0 auto;
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .generate-btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: #3b82f6;
            color: white;
            font-size: 17px;
            cursor: pointer;
            margin-top: 10px;
        }

        .download-btn { background: #22c55e; }

        .result-container {
            max-width: 1000px;
            margin: 35px auto;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin-top: 20px;
            border-radius: 14px;
            border: 1px solid #334155;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.5;
        }

        .mermaid {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 12px;
            overflow-x: auto;
        }
    </style>
</head>

<body>

<aside class="sidebar">
    <h2>Project History</h2>
    <div id="historyList">
        <p style="color:#94a3b8;">Login to view your history.</p>
    </div>
</aside>

<main class="main">

    <div class="topbar">
        <button id="loginBtn" class="auth-btn secondary" onclick="login()">Login</button>
        <button id="registerBtn" class="auth-btn" onclick="register()">Register</button>
        <button id="logoutBtn" class="auth-btn secondary" onclick="logout()" style="display:none;">Logout</button>
        <div id="avatar" class="avatar">A</div>
    </div>

    <section class="welcome">
        <h1>Welcome to ArchAgent-R</h1>
        <p>
            Generate architecture plans, technology stack recommendations,
            diagrams, implementation steps, and AI-powered reviews.
        </p>
    </section>

    <section class="input-card">
        <input type="text" id="inputText" placeholder="Type your software idea here">
        <input type="text" id="modifyText" placeholder="Optional modification request">

        <button class="generate-btn" onclick="sendRequest(true)">Generate Architecture</button>
        <button class="generate-btn download-btn" onclick="downloadReport()">Download Report</button>
    </section>

    <section class="result-container">
        <div id="output"></div>
    </section>

</main>

<script>
    const API_URL = "http://127.0.0.1:8000";
    let currentUser = JSON.parse(localStorage.getItem("currentUser"));

    function updateAuthUI() {
        const avatar = document.getElementById("avatar");

        if (currentUser) {
            document.getElementById("loginBtn").style.display = "none";
            document.getElementById("registerBtn").style.display = "none";
            document.getElementById("logoutBtn").style.display = "inline-block";
            avatar.style.display = "flex";
            avatar.textContent = currentUser.name.charAt(0).toUpperCase();
            loadHistory();
        } else {
            document.getElementById("loginBtn").style.display = "inline-block";
            document.getElementById("registerBtn").style.display = "inline-block";
            document.getElementById("logoutBtn").style.display = "none";
            avatar.style.display = "none";
            document.getElementById("historyList").innerHTML =
                `<p style="color:#94a3b8;">Login to view your history.</p>`;
        }
    }

    async function register() {
        const name = prompt("Enter your name:");
        const email = prompt("Enter your email:");
        const password = prompt("Enter your password:");

        if (!name || !email || !password) return;

        const response = await fetch(`${API_URL}/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();
        alert(data.message);
    }

    async function login() {
        const email = prompt("Enter your email:");
        const password = prompt("Enter your password:");

        if (!email || !password) return;

        const response = await fetch(`${API_URL}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.user) {
            currentUser = data.user;
            localStorage.setItem("currentUser", JSON.stringify(currentUser));
            updateAuthUI();
            alert("Login successful");
        } else {
            alert(data.message);
        }
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem("currentUser");
        document.getElementById("output").innerHTML = "";
        updateAuthUI();
    }

    async function loadHistory() {
        if (!currentUser) return;

        const response = await fetch(`${API_URL}/history?user_id=${currentUser.id}`);
        const data = await response.json();

        const historyList = document.getElementById("historyList");

        if (!data.history.length) {
            historyList.innerHTML = `<p style="color:#94a3b8;">No history yet.</p>`;
            return;
        }

        historyList.innerHTML = "";

        data.history.forEach(item => {
            const div = document.createElement("div");
            div.className = "history-item";

            div.innerHTML = `
                <div class="history-title">${item.input_text}</div>
                <div class="history-date">${item.created_at}</div>
                <div class="history-date">${item.modification || ""}</div>
            `;

            div.onclick = function () {
                document.getElementById("inputText").value = item.input_text;
                document.getElementById("modifyText").value = item.modification || "";
                sendRequest(false);
            };

            historyList.appendChild(div);
        });
    }

    function cleanMermaidCode(text) {
        return text
            .replace(/```mermaid/g, "")
            .replace(/```/g, "")
            .trim();
    }

    function addTextCard(title, text) {
        const card = document.createElement("div");
        card.className = "card";

        const h2 = document.createElement("h2");
        h2.textContent = title;

        const pre = document.createElement("pre");
        pre.textContent = text || "No data returned.";

        card.appendChild(h2);
        card.appendChild(pre);

        document.getElementById("output").appendChild(card);
    }

    async function addDiagramCard(diagramCode) {
        const card = document.createElement("div");
        card.className = "card";

        const h2 = document.createElement("h2");
        h2.textContent = "📊 Architecture Diagram";

        const diagramDiv = document.createElement("div");
        diagramDiv.className = "mermaid";
        diagramDiv.textContent = cleanMermaidCode(diagramCode);

        card.appendChild(h2);
        card.appendChild(diagramDiv);

        document.getElementById("output").appendChild(card);

        try {
            await window.mermaid.run({ nodes: [diagramDiv] });
        } catch (error) {
            diagramDiv.textContent = "Diagram rendering failed. Please try again.";
            console.log("Mermaid error:", error);
        }
    }

    async function saveCurrentHistory(input, modification) {
        if (!currentUser) return;

        await fetch(`${API_URL}/save-history`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                user_id: currentUser.id,
                input_text: input,
                modification: modification
            })
        });

        await loadHistory();
    }

    async function sendRequest(saveToHistory) {
        const input = document.getElementById("inputText").value;
        const modification = document.getElementById("modifyText").value;

        if (!input.trim()) {
            alert("Please enter a system idea.");
            return;
        }

        const outputDiv = document.getElementById("output");

        outputDiv.innerHTML = `
            <div class="card">
                <h2>⏳ Generating architecture...</h2>
                <p>Please wait while ArchAgent-R agents process your request.</p>
            </div>
        `;

        try {
            const response = await fetch(
                `${API_URL}/process?input_text=${encodeURIComponent(input)}&modification=${encodeURIComponent(modification)}`
            );

            const data = await response.json();

            outputDiv.innerHTML = "";

            addTextCard("📌 Architecture Plan", data.plan);
            addTextCard("🧰 Technology Stack Recommendation", data.tech_stack);
            await addDiagramCard(data.diagram);
            addTextCard("⚙️ Implementation Steps", data.execution);
            addTextCard("🧠 Architecture Review", data.review);

            outputDiv.scrollIntoView({ behavior: "smooth" });

            if (saveToHistory && currentUser) {
                await saveCurrentHistory(input, modification);
            }

        } catch (error) {
            outputDiv.innerHTML = `
                <div class="card">
                    <h2>❌ Error</h2>
                    <p>${error}</p>
                </div>
            `;
        }
    }

    function downloadReport() {
        const output = document.getElementById("output").innerText;

        if (!output.trim()) {
            alert("Please generate an architecture report first.");
            return;
        }

        const blob = new Blob([output], { type: "text/plain" });
        const link = document.createElement("a");

        link.href = URL.createObjectURL(blob);
        link.download = "ArchAgent-R_Report.txt";
        link.click();
    }

    updateAuthUI();
</script>

</body>
</html>
